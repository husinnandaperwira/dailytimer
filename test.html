<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Property Tests — Life Dashboard</title>
  <style>
    body { font-family: monospace; padding: 1rem; background: #111; color: #eee; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h2>Property-Based Tests</h2>
  <pre id="output">Running…</pre>

  <!-- Load fast-check from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fast-check@3/lib/bundle/fast-check.min.js"></script>
  <!-- Load app modules (exposes window.GreetingModule) -->
  <script src="js/app.js"></script>

  <script>
    const out = document.getElementById('output');
    const lines = [];

    function log(msg, cls) {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = msg + '\n';
      out.appendChild(span);
    }

    function runProperty(name, arb, predicate) {
      try {
        fc.assert(
          fc.property(arb, predicate),
          { numRuns: 100 }
        );
        log('✓ PASS  ' + name, 'pass');
      } catch (e) {
        log('✗ FAIL  ' + name + '\n       ' + e.message, 'fail');
      }
    }

    out.textContent = '';

    // Feature: vanilla-js-web-app, Property 1: Greeting correctness for all hours
    // Validates: Requirements 1.3, 1.4, 1.5, 1.6
    runProperty(
      'Property 1: Greeting correctness for all hours',
      fc.integer({ min: 0, max: 23 }),
      (hour) => {
        const greeting = window.GreetingModule.getGreeting(hour);
        if (hour >= 5 && hour <= 11)  return greeting === 'Good morning';
        if (hour >= 12 && hour <= 17) return greeting === 'Good afternoon';
        if (hour >= 18 && hour <= 21) return greeting === 'Good evening';
        // hours 0-4 and 22-23
        return greeting === 'Good night';
      }
    );

    // Feature: vanilla-js-web-app, Property 2: Time formatting correctness
    // Validates: Requirements 1.1
    runProperty(
      'Property 2: Time formatting correctness',
      fc.date(),
      (date) => {
        const result = window.GreetingModule.formatTime(date);
        // Must match HH:MM pattern
        if (!/^\d{2}:\d{2}$/.test(result)) return false;
        const [hh, mm] = result.split(':').map(Number);
        return hh === date.getHours() && mm === date.getMinutes();
      }
    );

    log('\nDone.', '');
  </script>
</body>
</html>
